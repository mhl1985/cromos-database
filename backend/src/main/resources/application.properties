# Nombre de la aplicación (informativo, aparece en logs y contexto de Spring).
spring.application.name=cromosdatabase-backend

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================

# URL de conexión a MySQL en application-local.properties (fuera de GIT).
spring.datasource.url=MI_URL

# Credenciales de BD en application-local.properties (fuera de GIT).
spring.datasource.username=MI_USUARIO
spring.datasource.password=MI_PASSWORD

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN JPA / HIBERNATE
# ===============================

# No permite a Hibernate crear, ni modificar tablas de la BD.
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en consola.
spring.jpa.show-sql=true

# Formatea el SQL para que sea más legible en logs
spring.jpa.properties.hibernate.format_sql=true

# Evita queries fuera de la capa service.
spring.jpa.open-in-view=false

# ===============================
# CONFIGURACIÓN ENTORNO (PROPERTIES)
# ===============================

# Activa el application-local.properties automáticamente.
spring.profiles.active=local

# ===============================
# CONFIGURACIÓN SEGURIDAD (JWT)
# ===============================

# jwt.secret en application-local.properties (fuera de GIT).
app.jwt.secret=MI_SECRET
app.jwt.expiration-ms=86400000