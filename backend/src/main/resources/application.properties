# Nombre de la aplicación (informativo, aparece en logs y contexto de Spring).
spring.application.name=cromosdatabase-backend

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================
# URL de conexión a MySQL local (sin SSL, con zona horaria y auth moderna).
spring.datasource.url=jdbc:mysql://localhost:3306/cromos_database?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true

# Acceso BD.
spring.datasource.username=root
spring.datasource.password=XXXXXXXXXXXXXXXXX
# Driver

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN JPA / HIBERNATE
# ===============================

# No permite a Hibernate crear, ni modificar tablas de la BD.
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en consola.
spring.jpa.show-sql=true

# Formatea el SQL para que sea más legible en logs
spring.jpa.properties.hibernate.format_sql=true

# Evita queries fuera de la capa service
spring.jpa.open-in-view=false